version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aicourse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aicourse
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aicourse-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/aicourse
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:/db/changelog/db.changelog-master.xml
      SPRING_AI_GOOGLE_GENAI_API_KEY: dummy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: aicourse-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
