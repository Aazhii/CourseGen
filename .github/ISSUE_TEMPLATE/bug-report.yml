name: 🪲 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Chrome 137 / Windows 11 / Docker
